<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Node: {{ node_id }}</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --success: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h1,
        h2 {
            margin: 0;
            color: var(--accent);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .balance {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            box-sizing: border-box;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background-color: var(--success);
        }

        .chain-viewer {
            margin-top: 2rem;
        }

        .block {
            border-left: 3px solid var(--accent);
            background: var(--card-bg);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .block-hash {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            word-break: break-all;
        }

        .status-pill {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Node: {{ node_id }}</h1>
                <p style="color: var(--text-dim); margin-top: 0.5rem;">Blockchain Dashboard</p>
            </div>
            <div class="status-pill">Status: Online</div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Wallet</h2>
                <div class="balance">{{ balance }} <small style="font-size: 1rem; color: var(--text-dim);">BTC</small>
                </div>
                <p style="color: var(--text-dim); font-size: 0.8rem;">Current Balance on Blockchain</p>
                <div style="margin-top: 1rem;">
                    <button id="mineBtn" class="secondary">Mine New Block</button>
                    <div id="mineStatus" style="margin-top: 0.5rem; font-size: 0.8rem;"></div>
                </div>
            </div>

            <div class="card">
                <h2>New Transaction</h2>
                <div class="form-group">
                    <label for="receiver">Receiver ID</label>
                    <input type="text" id="receiver" placeholder="e.g. Bob">
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="0">
                </div>
                <button id="sendBtn">Send BTC</button>
                <div id="txStatus" style="margin-top: 0.5rem; font-size: 0.8rem;"></div>
            </div>
        </div>

        <div class="chain-viewer">
            <h2>Blockchain History</h2>
            <div id="chain">
                <p>Loading chain...</p>
            </div>
        </div>
    </div>

    <script>
        const node_id = "{{ node_id }}";

        async function updateChain() {
            try {
                const response = await fetch('/chain');
                const chain = await response.json();
                const chainDiv = document.getElementById('chain');
                chainDiv.innerHTML = '';

                chain.reverse().forEach(block => {
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'block';
                    blockDiv.innerHTML = `
                        <div class="block-header">
                            <strong>Block #${block.index}</strong>
                            <small class="text-dim">${new Date(block.timestamp * 1000).toLocaleString()}</small>
                        </div>
                        <div class="block-hash">Hash: ${block.hash}</div>
                        <div style="margin-top: 0.5rem; font-size: 0.85rem;">
                            <strong>Transactions:</strong> ${block.transactions.length}
                            <ul>
                                ${block.transactions.map(tx => `<li>${tx.sender} -> ${tx.receiver}: ${tx.amount} BTC</li>`).join('')}
                            </ul>
                        </div>
                    `;
                    chainDiv.appendChild(blockDiv);
                });
            } catch (error) {
                console.error('Failed to fetch chain:', error);
            }
        }

        document.getElementById('mineBtn').onclick = async () => {
            const status = document.getElementById('mineStatus');
            status.innerText = 'Mining...';
            try {
                const response = await fetch(`/mine/${node_id}`, { method: 'POST' });
                const data = await response.json();
                status.innerText = data.message || data.detail;
                setTimeout(() => location.reload(), 1500);
            } catch (error) {
                status.innerText = 'Error mining block';
            }
        };

        document.getElementById('sendBtn').onclick = async () => {
            const receiver = document.getElementById('receiver').value;
            const amount = document.getElementById('amount').value;
            const status = document.getElementById('txStatus');

            if (!receiver || !amount) {
                status.innerText = 'Please fill all fields';
                return;
            }

            try {
                const response = await fetch(`/transaction/${node_id}/${receiver}/${amount}`, { method: 'POST' });
                const data = await response.json();
                status.innerText = data.message || data.detail;
                if (response.ok) {
                    document.getElementById('receiver').value = '';
                    document.getElementById('amount').value = '';
                }
            } catch (error) {
                status.innerText = 'Error sending transaction';
            }
        };

        updateChain();
    </script>
</body>

</html>
